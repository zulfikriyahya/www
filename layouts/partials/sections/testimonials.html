<section class="section border-t theme-border">
  <div class="container-content">

    <div class="text-center max-w-2xl mx-auto mb-16">
      <span class="section-label">Testimoni</span>
      <h2 class="section-title">Yang klien katakan</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      {{ range site.Data.testimonials }}
      <div class="card p-6 flex flex-col gap-4">
        <div class="flex gap-1">
          {{ range seq .rating }}
          <svg class="w-4 h-4" fill="currentColor" style="color: #f0883e;" viewBox="0 0 20 20">
            <path
              d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
          </svg>
          {{ end }}
        </div>
        <p class="text-sm theme-text-secondary leading-relaxed flex-1">
          "{{ .content }}"
        </p>
        <div class="flex items-center gap-3 pt-4 border-t theme-border">
          <div
            class="w-9 h-9 rounded-full theme-bg-overlay border theme-border flex items-center justify-center text-sm font-mono font-bold theme-text-secondary">
            {{ substr .name 0 1 }}
          </div>
          <div>
            <p class="text-sm font-medium theme-text-primary">{{ .name }}</p>
            <p class="text-xs theme-text-muted">{{ .role }} · {{ .company }}</p>
          </div>
        </div>
      </div>
      {{ end }}
    </div>

  </div>
</section>
