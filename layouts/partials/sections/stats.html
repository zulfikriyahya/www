<section class="border-t theme-border theme-bg-surface">
  <div class="container-content py-16">
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-8">
      {{ range site.Data.stats }}
      <div class="text-center">
        <div class="text-4xl font-bold font-mono theme-text-primary">
          <span data-counter data-target="{{ .value }}">0</span>{{ .suffix }}
        </div>
        <p class="text-sm theme-text-secondary mt-2">{{ .label }}</p>
      </div>
      {{ end }}
    </div>
  </div>
</section>
